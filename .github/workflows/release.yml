name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: onboard-linux-amd64
            goarch: amd64
            goos: linux
          - os: macos-latest
            artifact_name: onboard-darwin-amd64
            goarch: amd64
            goos: darwin
          - os: windows-latest
            artifact_name: onboard-windows-amd64.exe
            goarch: amd64
            goos: windows
          # Optionally add ARM64 support for M1 Macs
          # - os: macos-latest
          #   artifact_name: onboard-darwin-arm64
          #   goarch: arm64
          #   goos: darwin

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.artifact_name }} main.go

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
