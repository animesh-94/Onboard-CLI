name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: onboard-linux-amd64
          - os: macos-13
            artifact_name: onboard-darwin-amd64
          - os: macos-latest
            artifact_name: onboard-darwin-arm64
          - os: windows-latest
            artifact_name: onboard-windows-amd64.exe
          # Optionally add ARM64 support for M1 Macs
          # - os: macos-latest
          #   artifact_name: onboard-darwin-arm64
          #   goarch: arm64
          #   goos: darwin

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build UI
        run: |
          cd ui
          npm install
          npm run build

      - name: Build Binary
        env:
          CGO_ENABLED: 1
        run: |
          go build -ldflags="-s -w -X 'github.com/onboard-cli/cmd.Version=${{ github.ref_name }}'" -o ${{ matrix.artifact_name }} main.go

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
